<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Workout Tracker</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div id="config-warning">
    Supabase isn't configured yet — edit <code>js/config.js</code> with your project URL and anon key.
  </div>

  <main id="app">
    <section id="view-today" class="view active"></section>
    <section id="view-history" class="view"></section>
    <section id="view-progress" class="view"></section>
    <section id="view-body" class="view"></section>
    <section id="view-manage" class="view"></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11M4 9v6M20 9v6M2 10.5v3M22 10.5v3"/></svg>
      <span>Today</span>
    </button>
    <button class="nav-btn" data-view="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      <span>History</span>
    </button>
    <button class="nav-btn" data-view="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V10M12 19V5M20 19v-7"/></svg>
      <span>Progress</span>
    </button>
    <button class="nav-btn" data-view="body">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.5"/><path d="M12 8v6M8 21l4-7 4 7M9 12H4M15 12h5"/></svg>
      <span>Body</span>
    </button>
    <button class="nav-btn" data-view="manage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      <span>Manage</span>
    </button>
  </nav>

  <div id="rest-timer-overlay" class="rest-timer-overlay">
    <div class="rest-timer-card">
      <div id="rest-timer-label" class="rest-timer-label">Rest</div>
      <div id="rest-timer-time" class="rest-timer-time">0:00</div>
      <div class="rest-timer-actions">
        <button id="rest-timer-add15" class="secondary-btn">+15s</button>
        <button id="rest-timer-dismiss" class="primary-btn">Dismiss</button>
      </div>
    </div>
  </div>

  <div id="exercise-history-overlay" class="detail-overlay">
    <div class="detail-sheet">
      <div class="detail-header">
        <span id="exercise-history-title"></span>
        <button id="exercise-history-close" class="close-btn">✕</button>
      </div>
      <div id="exercise-history-body"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
